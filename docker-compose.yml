services:
  postgres:
    image: postgres:16
    container_name: hotel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hotel-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      PORT: 4000
      APP_NAME: Hotel Management Backend
      API_VERSION: v1
      LOG_LEVEL: info
      TRUST_PROXY: false
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hotel_management?schema=hotel
      REDIS_URL: redis://redis:6379
      REDIS_KEY_PREFIX: hms
      REDIS_TLS_ENABLED: false
      JWT_ACCESS_SECRET: replace-me-access-secret
      JWT_REFRESH_SECRET: replace-me-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      JWT_ISSUER: hotel-management-backend
      JWT_AUDIENCE: hotel-management-clients
      BCRYPT_SALT_ROUNDS: 12
      AUTH_MAX_FAILED_LOGINS: 5
      AUTH_ACCOUNT_LOCK_MINUTES: 15
      PASSWORD_RESET_TOKEN_TTL_MINUTES: 30
      EMAIL_VERIFICATION_TOKEN_TTL_MINUTES: 60
      APP_BASE_URL: http://localhost:4000
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
      AUTH_RATE_LIMIT_MAX: 10
      SWAGGER_ENABLED: true
      SWAGGER_PATH: /api/docs
      FILE_UPLOAD_MAX_MB: 20
      FILE_UPLOAD_DIR: /tmp/uploads
    ports:
      - '4000:4000'
    command: npm run start

volumes:
  postgres_data:
